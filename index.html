<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Word Encoder/Decoder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index-styles.css">
</head>

<body>
    <div class="container">
        <h1>🔐 Secret Encoder</h1>
        <p class="subtitle">Encode and decode messages using your secret word</p>

        <div class="controls-row">
            <div class="input-group">
                <label for="secretWord">Secret Word</label>
                <input type="password" id="secretWord" placeholder="Enter secret word..." autocomplete="off">
            </div>

            <div class="mode-switcher">
                <span class="mode-label" id="modeLabel">ENCODE</span>
                <label class="switch">
                    <input type="checkbox" id="modeToggle">
                    <span class="slider"></span>
                </label>
                <span class="mode-label">DECODE</span>
            </div>
        </div>

        <div class="textarea-group">
            <div class="textarea-wrapper">
                <label for="inputText">Input</label>
                <textarea id="inputText" placeholder="Enter text to encode/decode..."></textarea>
                <div class="char-count" id="inputCount">0 characters</div>
            </div>
            <div class="textarea-wrapper">
                <label for="outputText">Output</label>
                <textarea id="outputText" placeholder="Result will appear here..." readonly></textarea>
                <div class="char-count" id="outputCount">0 characters</div>
            </div>
        </div>

        <hr class="separator">

        <div class="database-section">
            <div class="section-header">
                <h2>🔓 Password Database</h2>
                <div class="stat-badge"><span id="totalEntries">0</span> Entries</div>
            </div>
            <div class="entries-container" id="entriesContainer"></div>
        </div>

        <div class="warning">
            ⚠️ <strong>Note:</strong> Keep your secret word safe! Without it, you won't be able to decode your messages.
        </div>
    </div>

    <script src="passwords.js"></script>
    <script src="index.js"></script>
</body>

</html>
