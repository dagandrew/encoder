<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Word Encoder/Decoder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #2d3748;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .nav-links {
            text-align: center;
            margin-bottom: 30px;
        }

        .nav-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .input-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            color: #4a5568;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background: white;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .mode-switcher {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border-radius: 16px;
        }

        .mode-label {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.95rem;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 32px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #667eea;
            transition: 0.4s;
            border-radius: 32px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background: #764ba2;
        }

        input:checked+.slider:before {
            transform: translateX(28px);
        }

        .textarea-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .textarea-wrapper {
            display: flex;
            flex-direction: column;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            resize: vertical;
            transition: all 0.3s ease;
            background: white;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .char-count {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #718096;
            text-align: right;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 24px 20px;
                border-radius: 16px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .subtitle {
                font-size: 0.85rem;
            }

            .textarea-group {
                grid-template-columns: 1fr;
                gap: 24px;
            }

            textarea {
                min-height: 150px;
                font-size: 0.9rem;
            }

            .mode-switcher {
                padding: 16px;
                gap: 12px;
            }

            .mode-label {
                font-size: 0.85rem;
            }

            input[type="text"] {
                font-size: 0.95rem;
                padding: 12px 16px;
            }

            label {
                font-size: 0.85rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 16px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.8rem;
                margin-bottom: 20px;
            }

            textarea {
                min-height: 120px;
                padding: 12px;
            }

            .mode-switcher {
                flex-direction: column;
                gap: 10px;
            }

            .warning {
                font-size: 0.85rem;
                padding: 10px 12px;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .container {
                max-width: 700px;
            }

            textarea {
                min-height: 180px;
            }
        }


        .warning {
            background: rgba(237, 137, 54, 0.1);
            border-left: 4px solid #ed8936;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 20px;
            color: #744210;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔐 Secret Encoder</h1>
        <p class="subtitle">Encode and decode messages using your secret word</p>

        <div class="nav-links">
            <a href="decode.html">View Decode Page →</a>
        </div>

        <div class="input-group">
            <label for="secretWord">Secret Word</label>
            <input type="text" id="secretWord" placeholder="Enter your secret word..." autocomplete="off">
        </div>

        <div class="mode-switcher">
            <span class="mode-label" id="modeLabel">ENCODE</span>
            <label class="switch">
                <input type="checkbox" id="modeToggle">
                <span class="slider"></span>
            </label>
            <span class="mode-label">DECODE</span>
        </div>

        <div class="textarea-group">
            <div class="textarea-wrapper">
                <label for="inputText">Input</label>
                <textarea id="inputText" placeholder="Enter text to encode/decode..."></textarea>
                <div class="char-count" id="inputCount">0 characters</div>
            </div>
            <div class="textarea-wrapper">
                <label for="outputText">Output</label>
                <textarea id="outputText" placeholder="Result will appear here..." readonly></textarea>
                <div class="char-count" id="outputCount">0 characters</div>
            </div>
        </div>

        <div class="warning">
            ⚠️ <strong>Note:</strong> Keep your secret word safe! Without it, you won't be able to decode your messages.
        </div>
    </div>

    <script>
        const secretWordInput = document.getElementById('secretWord');
        const modeToggle = document.getElementById('modeToggle');
        const modeLabel = document.getElementById('modeLabel');
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const inputCount = document.getElementById('inputCount');
        const outputCount = document.getElementById('outputCount');

        // Encoding/Decoding algorithm based on secret word
        function generateKey(secretWord, length) {
            if (!secretWord) return '';
            let key = '';
            for (let i = 0; i < length; i++) {
                key += secretWord[i % secretWord.length];
            }
            return key;
        }

        function encode(text, secretWord) {
            if (!secretWord || !text) return text;

            const key = generateKey(secretWord, text.length);
            let encoded = '';

            for (let i = 0; i < text.length; i++) {
                const textChar = text.charCodeAt(i);
                const keyChar = key.charCodeAt(i);
                const encodedChar = textChar + keyChar;
                encoded += String.fromCharCode(encodedChar);
            }

            // Convert to base64 for better representation
            return btoa(encoded);
        }

        function decode(encodedText, secretWord) {
            if (!secretWord || !encodedText) return encodedText;

            try {
                // Decode from base64
                const decoded = atob(encodedText);
                const key = generateKey(secretWord, decoded.length);
                let original = '';

                for (let i = 0; i < decoded.length; i++) {
                    const encodedChar = decoded.charCodeAt(i);
                    const keyChar = key.charCodeAt(i);
                    const originalChar = encodedChar - keyChar;
                    original += String.fromCharCode(originalChar);
                }

                return original;
            } catch (e) {
                return '[Invalid encoded text or wrong secret word]';
            }
        }

        function processText() {
            const secret = secretWordInput.value.trim();
            const input = inputText.value;
            const isDecodeMode = modeToggle.checked;

            if (!secret) {
                outputText.value = '[Please enter a secret word first]';
                return;
            }

            if (!input) {
                outputText.value = '';
                return;
            }

            if (isDecodeMode) {
                outputText.value = decode(input, secret);
            } else {
                outputText.value = encode(input, secret);
            }

            updateCharCount();
        }

        function updateCharCount() {
            inputCount.textContent = `${inputText.value.length} characters`;
            outputCount.textContent = `${outputText.value.length} characters`;
        }

        function updateModeLabel() {
            modeLabel.textContent = modeToggle.checked ? 'DECODE' : 'ENCODE';
            modeLabel.style.fontWeight = modeToggle.checked ? '400' : '600';
            document.querySelectorAll('.mode-label')[1].style.fontWeight = modeToggle.checked ? '600' : '400';
        }

        // Event listeners
        secretWordInput.addEventListener('input', processText);
        inputText.addEventListener('input', () => {
            processText();
            updateCharCount();
        });
        modeToggle.addEventListener('change', () => {
            updateModeLabel();
            processText();
        });

        // Initialize
        updateCharCount();
        updateModeLabel();
    </script>
</body>

</html>
