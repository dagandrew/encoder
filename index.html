        // ============================================
        // IMPROVED SECURE ENCODING/DECODING ALGORITHM
        // ============================================

        // Simple hash function for key derivation
        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; // Convert to 32bit integer
            }
            return Math.abs(hash);
        }

        // Key derivation function (similar to PBKDF2 concept)
        function deriveKey(secretWord, salt, iterations = 1000) {
            let key = secretWord + salt;
            for (let i = 0; i < iterations; i++) {
                key = String(simpleHash(key + i + salt));
            }
            return key;
        }

        // Generate a pseudo-random permutation based on the key
        function generatePermutation(length, key) {
            const perm = Array.from({ length }, (_, i) => i);
            const hash = simpleHash(key);
            let seed = hash;

            // Fisher-Yates shuffle with seeded random
            for (let i = length - 1; i > 0; i--) {
                seed = (seed * 1103515245 + 12345) & 0x7fffffff;
                const j = seed % (i + 1);
                [perm[i], perm[j]] = [perm[j], perm[i]];
            }
            return perm;
        }

        // Generate cipher key from secret word
        function generateCipherKey(secretWord, length) {
            if (!secretWord) return null;

            // Create multiple derived keys for extra security
            const salt1 = deriveKey(secretWord, 'layer1', 500);
            const salt2 = deriveKey(secretWord, 'layer2', 750);
            const baseKey = deriveKey(secretWord, salt1 + salt2, 1000);

            let key = '';
            for (let i = 0; i < length; i++) {
                // Combine multiple transformations
                const charCode = (
                    simpleHash(baseKey + i.toString()) % 256 +
                    simpleHash(salt1 + i.toString()) % 128 +
                    simpleHash(salt2 + i.toString()) % 128
                ) % 256;
                key += String.fromCharCode(charCode + 32); // Shift to printable range
            }
            return key;
        }

        // Encode function with multiple security layers
        function encode(text, secretWord) {
            if (!secretWord || !text) return text;

            try {
                // Layer 1: Generate cipher key
                const key = generateCipherKey(secretWord, text.length);
                if (!key) return text;

                // Layer 2: XOR encryption with key
                let xored = '';
                for (let i = 0; i < text.length; i++) {
                    const textChar = text.charCodeAt(i);
                    const keyChar = key.charCodeAt(i);
                    xored += String.fromCharCode((textChar ^ keyChar) + i % 16); // Add position offset
                }

                // Layer 3: Character position permutation
                const permutation = generatePermutation(xored.length, secretWord + 'perm');
                const permuted = permutation.map(i => xored[i]).join('');

                // Layer 4: Add checksum for integrity verification
                const checksum = simpleHash(permuted + secretWord).toString(36);
                const withChecksum = checksum + ':' + permuted;

                // Layer 5: Base64 encode
                return btoa(unescape(encodeURIComponent(withChecksum)));
            } catch (e) {
                console.error('Encoding error:', e);
                return '[Encoding error]';
            }
        }

        // Decode function with multiple security layers
        function decode(encodedText, secretWord) {
            if (!secretWord || !encodedText) return '';

            try {
                // Layer 5: Base64 decode
                const withChecksum = decodeURIComponent(escape(atob(encodedText)));

                // Layer 4: Extract and verify checksum
                const colonIndex = withChecksum.indexOf(':');
                if (colonIndex === -1) return '[Invalid format]';

                const storedChecksum = withChecksum.substring(0, colonIndex);
                const permuted = withChecksum.substring(colonIndex + 1);

                const computedChecksum = simpleHash(permuted + secretWord).toString(36);
                if (storedChecksum !== computedChecksum) {
                    return '[Wrong secret word or corrupted data]';
                }

                // Layer 3: Reverse permutation
                const permutation = generatePermutation(permuted.length, secretWord + 'perm');
                const inversePerm = new Array(permuted.length);
                permutation.forEach((origIdx, newIdx) => {
                    inversePerm[origIdx] = newIdx;
                });
                const xored = inversePerm.map(i => permuted[i]).join('');

                // Layer 2: Reverse XOR with key
                const key = generateCipherKey(secretWord, xored.length);
                if (!key) return '[Key generation error]';

                let original = '';
                for (let i = 0; i < xored.length; i++) {
                    const xoredChar = xored.charCodeAt(i) - (i % 16); // Reverse position offset
                    const keyChar = key.charCodeAt(i);
                    original += String.fromCharCode(xoredChar ^ keyChar);
                }

                return original;
            } catch (e) {
                console.error('Decoding error:', e);
                return '[Invalid encoded text or wrong secret word]';
            }
        }

            const secret = secretWordInput.value.trim();
            const input = inputText.value;
            const isDecodeMode = modeToggle.checked;

            if (!secret) {
                outputText.value = '[Please enter a secret word first]';
                return;
            }

            if (!input) {
                outputText.value = '';
                return;
            }

            if (isDecodeMode) {
                outputText.value = decode(input, secret);
            } else {
                outputText.value = encode(input, secret);
            }

            updateCharCount();
        }

            inputCount.textContent = `${inputText.value.length} characters`;
            outputCount.textContent = `${outputText.value.length} characters`;

            }).catch(err => console.error('Failed to copy:', err));
        }

        function quickCopy(index, buttonId) {
            const secret = secretWordInput.value.trim();
            if (!secret) {
                showSecretWordPrompt();
                return;
            }

            const entry = DATABASE[index];
            const result = decode(entry.encoded, secret);
            copyToClipboard(result, buttonId);
        }

        function toggleDecoded(index) {
            const decodedSection = document.getElementById(`decoded-section-${index}`);
            const showBtn = document.getElementById(`show-btn-${index}`);
            const decodedTextEl = document.getElementById(`decoded-text-${index}`);

            const secret = secretWordInput.value.trim();
            if (!secret) {
                showSecretWordPrompt();
                return;
            }

            if (decodedSection.classList.contains('hidden')) {
                const entry = DATABASE[index];
                const result = decode(entry.encoded, secret);
                decodedTextEl.textContent = result;
                decodedSection.classList.remove('hidden');
                // Change to "eye-off" icon when showing
                showBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path></svg>`;
                showBtn.classList.add('bg-slate-200', 'text-slate-600');
                showBtn.classList.remove('bg-white', 'text-slate-500');
            } else {
                decodedSection.classList.add('hidden');
                // Change back to "eye" icon when hiding
                showBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>`;
                showBtn.classList.remove('bg-slate-200', 'text-slate-600');
                showBtn.classList.add('bg-white', 'text-slate-500');
            }
        }

        function showSecretWordPrompt() {
            secretWordInput.classList.add('ring-4', 'ring-red-300', 'border-red-400');
            secretWordInput.focus();
            setTimeout(() => {
                secretWordInput.classList.remove('ring-4', 'ring-red-300', 'border-red-400');
            }, 2000);
        }

        // ============================================
        // UI RENDERING
        // ============================================

        function createEntryCard(entry, index, decodedTitle) {
            const card = document.createElement('div');
            card.className = 'bg-white border border-slate-200 rounded-xl p-3 transition-all duration-200 hover:border-slate-400 hover:shadow-md';
            card.innerHTML = `
                <div class="flex items-center justify-between gap-2">
                    <div class="entry-title font-medium text-slate-800 text-sm truncate flex-1 min-w-0">${decodedTitle}</div>
                    <div class="flex gap-1.5 flex-shrink-0">
                        <button class="quick-copy-btn w-8 h-8 border-2 border-slate-800 rounded-lg cursor-pointer transition-all duration-150 bg-slate-800 text-white inline-flex items-center justify-center hover:bg-slate-700 active:scale-95" id="quick-copy-btn-${index}" onclick="quickCopy(${index}, 'quick-copy-btn-${index}')" title="Copy password">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        </button>
                        <button class="show-btn w-8 h-8 border-2 border-slate-200 rounded-lg cursor-pointer transition-all duration-150 bg-white text-slate-500 inline-flex items-center justify-center hover:bg-slate-50 hover:border-slate-300 active:scale-95" id="show-btn-${index}" onclick="toggleDecoded(${index})" title="Show password">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        </button>
                    </div>
                </div>
                <div class="hidden mt-2 pt-2 border-t border-dashed border-slate-200" id="decoded-section-${index}">
                    <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Password</div>
                    <div class="bg-emerald-50 border border-emerald-200 rounded-lg p-2 text-sm font-mono font-semibold text-emerald-700 break-all" id="decoded-text-${index}"></div>
                </div>
            `;
            return card;
        }

        function createFolderSection(folderName, folderId, entries) {
            const folder = document.createElement('div');
            folder.className = 'col-span-full mb-4';
            folder.innerHTML = `
                <button onclick="toggleFolder('${folderName}', '${folderId}')" class="w-full flex items-center justify-between p-3 bg-gradient-to-r from-slate-100 to-slate-50 rounded-xl border border-slate-200 hover:border-slate-300 transition-all duration-200 group">
                    <div class="flex items-center gap-2">
                        <span class="text-lg">📁</span>
                        <span class="font-semibold text-slate-700 capitalize text-sm">${folderName}</span>
                        <span class="bg-slate-200 text-slate-600 py-0.5 px-2 rounded-full text-xs font-medium">${entries.length}</span>
                    </div>
                    <svg id="folder-arrow-${folderId}" class="toggle-arrow w-4 h-4 text-slate-400 group-hover:text-slate-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </button>
                <div id="folder-content-${folderId}" class="folder-content grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2 mt-2">
                </div>
            `;

            const contentContainer = folder.querySelector(`#folder-content-${folderId}`);
            entries.forEach(({ entry, index, decodedTitle }) => {
                contentContainer.appendChild(createEntryCard(entry, index, decodedTitle));
            });

            return folder;
        }

        function initializeEntries() {
            if (!entriesContainer) return;
            entriesContainer.innerHTML = '';

            const secret = secretWordInput.value.trim();

            // Separate entries into folders and non-folder
            const folderGroups = {};
            const noFolderEntries = [];

            DATABASE.forEach((entry, index) => {
                const decodedTitle = secret ? decode(entry.title, secret) : entry.title;
                const decodedFolder = secret && entry.folder ? decode(entry.folder, secret) : entry.folder;

                if (decodedFolder) {
                    if (!folderGroups[decodedFolder]) {
                        folderGroups[decodedFolder] = [];
                    }
                    folderGroups[decodedFolder].push({ entry, index, decodedTitle, decodedFolder });
                } else {
                    noFolderEntries.push({ entry, index, decodedTitle });
                }
            });

            // Create grid container for non-folder entries
            const gridContainer = document.createElement('div');
            gridContainer.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 mb-4';

            // Render non-folder entries
            noFolderEntries.forEach(({ entry, index, decodedTitle }) => {
                gridContainer.appendChild(createEntryCard(entry, index, decodedTitle));
            });

            entriesContainer.appendChild(gridContainer);

            // Render folder sections
            Object.keys(folderGroups).sort().forEach((folderName, folderIndex) => {
                const folderId = `folder-${folderIndex}`;
                entriesContainer.appendChild(createFolderSection(folderName, folderId, folderGroups[folderName]));
            });

            if (totalEntriesEl) totalEntriesEl.textContent = DATABASE.length;
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================

        secretWordInput.addEventListener('input', () => {
            processText();
            // Re-render entries to update decoded titles
            initializeEntries();
            // Hide all decoded sections when secret word changes
            document.querySelectorAll('[id^="decoded-section-"]').forEach(el => el.classList.add('hidden'));
            // Reset all show buttons to eye icon
            document.querySelectorAll('.show-btn').forEach(btn => {
                btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>`;
                btn.classList.remove('bg-slate-200', 'text-slate-600');
                btn.classList.add('bg-white', 'text-slate-500');
            });
        });

        inputText.addEventListener('input', () => {
            processText();
            updateCharCount();
        });

        modeToggle.addEventListener('change', () => {
            processText();
        });

        // ============================================
        // INITIALIZATION
        // ============================================

        DATABASE = typeof PASSWORDS_DATABASE !== 'undefined' ? PASSWORDS_DATABASE : [];
        initializeEntries();
        updateCharCount();
    </script>
</body>

</html>
