<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Database - Decoder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>🔓 Password Database</h1>
        <p class="subtitle">Securely decode your stored passwords</p>

        <div class="nav-links">
            <a href="index.html">← Back to Encoder</a>
        </div>

        <div class="info-box">
            <strong>💡 How to use:</strong>
            Enter your master secret word. Use "Quick Copy" to copy without seeing the password, or click "Show" to
            reveal it first.
        </div>

        <div class="input-group">
            <label for="secretWord">🔑 Master Secret Word</label>
            <input type="password" id="secretWord" placeholder="Enter your master secret word..." autocomplete="off">
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="totalEntries">0</div>
                <div class="stat-label">Total Entries</div>
            </div>
        </div>

        <div class="entries-container" id="entriesContainer"></div>
    </div>

    <script src="passwords.js"></script>
    <script src="decode.js"></script>
</body>

</html>
